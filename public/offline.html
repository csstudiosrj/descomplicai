<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sem conexão — Descomplicaí</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #F9F7F4;
      color: #1A1714;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 24px;
      text-align: center;
    }
    .container { max-width: 400px; }
    .icon {
      width: 80px; height: 80px;
      margin: 0 auto 24px;
      background: #EDE4DE;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon svg { width: 40px; height: 40px; color: #8B6F5E; }
    h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 12px; }
    p { font-size: 1rem; color: #5C534A; line-height: 1.5; margin-bottom: 24px; }
    a {
      display: inline-block;
      padding: 12px 24px;
      background: #8B6F5E;
      color: #fff;
      text-decoration: none;
      border-radius: 10px;
      font-weight: 500;
      transition: background 150ms ease;
    }
    a:hover { background: #5C3D2E; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 12C3 6 7 3 12 3s9 3 11 9c-2 6-6 9-11 9S3 18 1 12z"/>
        <path d="M12 8v4"/><circle cx="12" cy="16.5" r=".75" fill="currentColor" stroke="none"/>
      </svg>
    </div>
    <h1>Você está offline</h1>
    <p>Algumas funcionalidades não estão disponíveis sem conexão com a internet. Verifique sua rede e tente novamente.</p>
    <a href="/">Voltar para o início</a>
  </div>
</body>
</html>
